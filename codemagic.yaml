workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc # 或 app_store
        bundle_identifier: com.you.app
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa # 这里指定只输出 ipa
      - flutter_drive.log
